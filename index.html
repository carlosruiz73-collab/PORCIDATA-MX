<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UZL Labs — AI Vision Systems</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap');

:root {
  --gold: #D4AF37;
  --gold-soft: #8B6B1F;
  --black: #0A0A0A;
  --dark: #111;
  --card: #151515;
  --text: #D6D6C8;
  --white: #fff;
  --border: rgba(212,175,55,0.2);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--black);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
}

/* NAV */
nav {
  position: fixed;
  width: 100%;
  padding: 1rem 2rem;
  display: flex;
  justify-content: space-between;
  background: rgba(0,0,0,0.8);
  border-bottom: 1px solid var(--border);
}

.nav-brand {
  font-family: 'Syne';
  font-weight: 800;
  color: var(--white);
}

.nav-brand span { color: var(--gold); }

/* HERO */
.hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 6rem 2rem;
}

.hero h1 {
  font-family: 'Syne';
  font-size: 3rem;
  color: var(--white);
}

.hero h1 span { color: var(--gold); }

.hero p {
  margin-top: 1rem;
  max-width: 500px;
}

/* BUTTON */
.btn {
  margin-top: 2rem;
  display: inline-block;
  background: var(--gold);
  color: black;
  padding: 0.8rem 1.5rem;
  text-decoration: none;
}

/* SECTION */
section {
  padding: 5rem 2rem;
}

/* FOOTER */
footer {
  border-top: 1px solid var(--border);
  padding: 2rem;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
}

.footer-brand {
  font-family: 'Syne';
  font-weight: 800;
  color: var(--white);
}

.footer-brand span { color: var(--gold); }

.footer-copy {
  font-size: 0.8rem;
  opacity: 0.6;
}

/* FIX IMPORTANTE */
html, body {
  height: 100%;
}

</style>
</head>

<body>

<nav>
  <div class="nav-brand">UZL<span>.Labs</span></div>
</nav>

<section class="hero">
  <h1>
    We make the<br>
    <span>unseen visible</span>
  </h1>

  <p>
    Vision artificial aplicada al mundo real. Desde porcicultura hasta sistemas de análisis inteligente.
  </p>

  <a href="#" class="btn">Ver proyecto</a>
</section>

<section>
  <h2 style="color:white;">Pig-Scan</h2>
  <p>Sistema de visión artificial para monitoreo porcino en tiempo real.</p>
</section>

<footer>
  <div class="footer-brand">UZL<span>.Labs</span></div>
  <div class="footer-copy">© 2026 — Uzuel Ruiz</div>
</footer>

</body>
</html>
